---
- name: Query all sync rules in icinga
  telekom_mms.icinga_director.icinga_syncrule_info:
    url: "{{ icinga_url }}"
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
  register: result
- assert:
    that:
      # yamllint disable-line rule:line-length
      - '(result.objects | length) == 1 or (result.objects | length) == 2 or (result.objects | length) == 3'
- name: Query a specific sync rule in icinga
  telekom_mms.icinga_director.icinga_syncrule_info:
    url: "{{ icinga_url }}"
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
  register: result
- assert:
    that:
      # yamllint disable-line rule:line-length
      - '(result.objects | length) == 1 or (result.objects | length) == 2 or (result.objects | length) == 3'
