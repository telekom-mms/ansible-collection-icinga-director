---
- name: Create a sync rule in icinga
  telekom_mms.icinga_director.icinga_syncrule:
    state: present
    url: http://nonexistent
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
    rule_name: "Sync Hosts from CMDB"
    object_type: "host"
    update_policy: "merge"
    purge_existing: false
    description: "Synchronizes hosts from the CMDB import source"
  ignore_errors: true
  register: result
- assert:
    that:
      - result.failed
      # yamllint disable-line rule:line-length
      - 'result.msg in [ "bad return code while creating: 401. Error message: HTTP Error 401: Unauthorized", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -3] Temporary failure in name resolution>", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -2] Name or service not known>", "bad return code while querying: 401. Error message: HTTP Error 401: Unauthorized", ]'
- name: Create a sync rule that purges deleted objects
  telekom_mms.icinga_director.icinga_syncrule:
    state: present
    url: http://nonexistent
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
    rule_name: "Sync Services from CMDB"
    object_type: "service"
    update_policy: "override"
    purge_existing: true
    purge_action: "disable"
    filter_expression: 'source.vars.monitored="yes"'
  ignore_errors: true
  register: result
- assert:
    that:
      - result.failed
      # yamllint disable-line rule:line-length
      - 'result.msg in [ "bad return code while creating: 401. Error message: HTTP Error 401: Unauthorized", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -3] Temporary failure in name resolution>", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -2] Name or service not known>", "bad return code while querying: 401. Error message: HTTP Error 401: Unauthorized", ]'
- name: Update the description of a sync rule
  telekom_mms.icinga_director.icinga_syncrule:
    state: present
    url: http://nonexistent
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
    rule_name: "Sync Hosts from CMDB"
    description: "Updated description"
    append: true
  ignore_errors: true
  register: result
- assert:
    that:
      - result.failed
      # yamllint disable-line rule:line-length
      - 'result.msg in [ "bad return code while creating: 401. Error message: HTTP Error 401: Unauthorized", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -3] Temporary failure in name resolution>", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -2] Name or service not known>", "bad return code while querying: 401. Error message: HTTP Error 401: Unauthorized", ]'
- name: Delete a sync rule in icinga
  telekom_mms.icinga_director.icinga_syncrule:
    state: absent
    url: http://nonexistent
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
    rule_name: "Sync Hosts from CMDB"
  ignore_errors: true
  register: result
- assert:
    that:
      - result.failed
      # yamllint disable-line rule:line-length
      - 'result.msg in [ "bad return code while creating: 401. Error message: HTTP Error 401: Unauthorized", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -3] Temporary failure in name resolution>", "bad return code while creating: -1. Error message: Request failed: <urlopen error [Errno -2] Name or service not known>", "bad return code while querying: 401. Error message: HTTP Error 401: Unauthorized", ]'
