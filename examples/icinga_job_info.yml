---
- name: Query all director jobs in icinga
  telekom_mms.icinga_director.icinga_job_info:
    url: "{{ icinga_url }}"
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"

- name: Query a specific director job in icinga
  telekom_mms.icinga_director.icinga_job_info:
    url: "{{ icinga_url }}"
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
    query: "Run CMDB Import"
