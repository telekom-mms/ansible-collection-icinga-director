---
- name: Query all import sources in icinga
  telekom_mms.icinga_director.icinga_importsource_info:
    url: "{{ icinga_url }}"
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
- name: Query a specific import source in icinga
  telekom_mms.icinga_director.icinga_importsource_info:
    url: "{{ icinga_url }}"
    url_username: "{{ icinga_user }}"
    url_password: "{{ icinga_pass }}"
    query: "My Import Source"
